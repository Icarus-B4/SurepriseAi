name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    name: Windows-Installer bauen
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Virtuelle Umgebung & Abhängigkeiten
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\pip install -r requirements.txt -r requirements-build.txt

      - name: NSIS 3 installieren (ZIP portable)
        shell: pwsh
        run: ./build/install_nsis.ps1

      - name: Installer bauen (NSIS, wie Hermes Desktop)
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          $ver = $env:RELEASE_VERSION -replace '^v',''
          Write-Host "Baue Version $ver"
          ./build/build.ps1 -Installer -SkipPip -Version $ver

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SurepriseAi-Setup.exe
          name: SurepriseAi ${{ github.ref_name }}
          body: |
            ## SurepriseAi ${{ github.ref_name }}

            **Windows-Installer** – Doppelklick auf `SurepriseAi-Setup.exe`.

            ### Neu in v0.1.24
            - **2-Panel-Einstellungen:** Settings und Diktat-Verlauf laufen jetzt in einem professionellen Zwei-Spalten-Fenster.
            - **Verbesserter Diktat-Verlauf:** Audio-Playback, Diff-Slider, Live-Transkript und Stil-Switch in einer aufgeräumten Detailansicht.
            - **Alle 7 Stil-Chips im Verlauf:** Bereinigen, Business, Stichpunkte, Kernpunkte, Kompakt, Lang und Formell können nachträglich angewendet werden.
            - **Lokale Auto-Korrektur:** Füllwörter, doppelte Wörter, Selbstkorrekturen, Leerzeichen und Satzanfänge werden vor dem Polishing bereinigt.
            - **UI-Politur:** Modernere Dynamic Island, bessere Waveform, Glas-Gradienten, lesbarere Diff-Ansicht und aktualisierte README-Screenshot-Galerie.

            Vollständiges Changelog: https://github.com/Icarus-B4/SurepriseAi/compare/v0.1.23...${{ github.ref_name }}
