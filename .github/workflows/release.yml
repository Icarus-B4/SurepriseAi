name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Windows-Installer bauen
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Virtuelle Umgebung & Abhängigkeiten
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\pip install --upgrade pip
          .\venv\Scripts\pip install -r requirements.txt -r requirements-build.txt

      - name: NSIS 3 installieren (SourceForge)
        shell: pwsh
        run: |
          $nsisDir = Join-Path $PWD ".tools\NSIS"
          $candidates = @(
            (Join-Path $nsisDir "makensis.exe"),
            (Join-Path $nsisDir "Bin\makensis.exe"),
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          )
          $existing = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($existing) {
            Write-Host "NSIS bereits vorhanden: $existing"
            exit 0
          }
          New-Item -ItemType Directory -Force -Path ".\.tools" | Out-Null
          $setup = ".\.tools\nsis-setup.exe"
          $url = "https://sourceforge.net/projects/nsis/files/NSIS%203/3.11/nsis-3.11-setup.exe/download"
          $ok = $false
          1..3 | ForEach-Object {
            if ($ok) { return }
            Write-Host "NSIS-Download Versuch $_/3..."
            try {
              Invoke-WebRequest -Uri $url -OutFile $setup -UseBasicParsing
              $ok = $true
            } catch {
              Write-Host "Fehler: $_"
              Start-Sleep -Seconds 5
            }
          }
          if (-not $ok) { throw "NSIS-Download von SourceForge fehlgeschlagen" }
          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null
          $dest = (Resolve-Path $nsisDir).Path
          Start-Process -FilePath $setup -ArgumentList "/S", "/D=$dest" -Wait
          if (-not (Test-Path (Join-Path $nsisDir "makensis.exe"))) {
            throw "NSIS silent install fehlgeschlagen (makensis.exe fehlt)"
          }
          Write-Host "NSIS installiert unter $dest"

      - name: Installer bauen (NSIS, wie Hermes Desktop)
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          $ver = $env:RELEASE_VERSION -replace '^v',''
          Write-Host "Baue Version $ver"
          powershell -ExecutionPolicy Bypass -File .\build\build.ps1 -Installer -SkipPip -Version $ver

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SurepriseAi-Setup.exe
          name: SurepriseAi ${{ github.ref_name }}
          body: |
            ## SurepriseAi ${{ github.ref_name }}

            **Windows-Installer** – Doppelklick auf `SurepriseAi-Setup.exe`.

            ### Neu
            - Auto-Update: Thread-sicherer Tray-Check, API-Fallback, SSL/certifi
            - Fehlermeldung statt stiller „Bereits aktuell“-Meldung bei API-Problemen

            ### Update testen
            1. Ältere Version installiert lassen (z. B. v0.1.1)
            2. Tray → **Nach Updates suchen…**
            3. Toast „Update verfügbar!“ → Download nach `%USERPROFILE%\Downloads`
            4. Setup startet automatisch

            Vollständiges Changelog: https://github.com/Icarus-B4/SurepriseAi/compare/v0.1.1...${{ github.ref_name }}
